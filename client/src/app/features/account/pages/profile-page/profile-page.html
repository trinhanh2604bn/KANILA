<div class="error-banner" *ngIf="!isLoading && loadError">{{ loadError }}</div>

<section class="card-soft profile-card">
  <header class="card-head">
    <div>
      <h2>Thông tin cá nhân</h2>
      <p>Quản lý thông tin tài khoản để cá nhân hóa trải nghiệm mua sắm.</p>
    </div>
    <button *ngIf="!isEditMode" type="button" class="btn-ghost" (click)="toggleEdit()">Chỉnh sửa</button>
  </header>

  <div class="save-msg" *ngIf="saveMessage">{{ saveMessage }}</div>

  <div class="field-grid" *ngIf="!isEditMode">
    <div class="field"><label>Họ và tên</label><p>{{ fullName }}</p></div>
    <div class="field"><label>Email</label><p>{{ email }}</p></div>
    <div class="field"><label>Số điện thoại</label><p>{{ phone || 'Chưa cập nhật' }}</p></div>
    <div class="field"><label>Giới tính</label><p>{{ gender }}</p></div>
    <div class="field"><label>Ngày sinh</label><p>{{ dob || 'Chưa cập nhật' }}</p></div>
  </div>

  <form class="field-grid edit-mode" *ngIf="isEditMode" (submit)="$event.preventDefault(); saveProfile()">
    <label class="input-wrap"><span>Họ và tên</span><input [(ngModel)]="draft.fullName" name="fullName" /></label>
    <label class="input-wrap"><span>Email</span><input [(ngModel)]="draft.email" name="email" type="email" /></label>
    <label class="input-wrap"><span>Số điện thoại</span><input [(ngModel)]="draft.phone" name="phone" /></label>
    <label class="input-wrap"><span>Giới tính</span>
      <select [(ngModel)]="draft.gender" name="gender">
        <option>Nữ</option>
        <option>Nam</option>
        <option>Khác</option>
      </select>
    </label>
    <label class="input-wrap"><span>Ngày sinh</span><input [(ngModel)]="draft.dob" name="dob" type="date" /></label>

    <div class="form-actions">
      <button type="submit" class="btn-primary">Lưu</button>
      <button type="button" class="btn-ghost" (click)="cancelEdit()">Hủy</button>
    </div>
  </form>
</section>

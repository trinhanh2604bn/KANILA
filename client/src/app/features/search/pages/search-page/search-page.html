<main class="container py-4">
  <h2 class="h5-style mb-3" style="color: var(--kanila-red);">Kết quả tìm kiếm</h2>
  <p class="mb-4" style="color: var(--kanila-text);">
    Từ khóa: <strong>{{ keyword || '...' }}</strong>
  </p>

  <div *ngIf="loading" class="text-muted">Đang tải...</div>

  <div *ngIf="!loading && items.length === 0" class="text-muted">
    Không tìm thấy sản phẩm phù hợp.
  </div>

  <div class="list-group" *ngIf="!loading && items.length > 0">
    <button
      type="button"
      class="list-group-item list-group-item-action d-flex align-items-center gap-3"
      *ngFor="let item of items"
      (click)="goToProduct(item)"
    >
      <img
        *ngIf="item.imageUrl"
        [src]="item.imageUrl"
        [alt]="item.name"
        class="search-thumb"
      >
      <div>
        <div class="fw-bold">{{ item.name }}</div>
        <small class="text-muted" *ngIf="item.brandName || item.price">
          <span *ngIf="item.brandName">{{ item.brandName }}</span>
          <span *ngIf="item.price"> - {{ item.price | number:'1.0-0' }}đ</span>
        </small>
      </div>
    </button>
  </div>
</main>

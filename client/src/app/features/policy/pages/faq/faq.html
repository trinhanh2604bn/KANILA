<div class="faq-page container py-5 fade-in-up">
    <h1 class="h4-style text-center text-uppercase mb-5">TRUNG TÂM TRỢ GIÚP KANILA</h1>

    <div class="faq-content-wrapper p-4 p-md-5 rounded-4 shadow-sm" style="background-color: var(--kanila-white);">
        
        <div class="intro-box p-4 rounded-4 mb-5 text-center" style="background-color: var(--kanila-bg);">
            <i class="bi bi-question-circle-fill mb-3 d-block" style="font-size: 40px; color: var(--kanila-red);"></i>
            <h2 class="h5-style mb-3" style="color: var(--kanila-red);">Câu Hỏi Thường Gặp (FAQ)</h2>
            <p class="mb-0">Dưới đây là tổng hợp những thắc mắc phổ biến nhất của khách hàng khi mua sắm tại Kanila. Bấm vào từng câu hỏi để xem câu trả lời chi tiết.</p>
        </div>

        <div class="faq-list">
            <div class="faq-item mb-3 rounded-3" *ngFor="let faq of faqs; let i = index" [class.active]="faq.isExpanded">
                
                <div class="faq-question p-4 d-flex justify-content-between align-items-center transition-all" 
                     (click)="toggleFaq(i)">
                    <span class="pe-3" style="font-weight: 700; font-family: var(--font-nunito, 'Nunito', sans-serif);">
                        {{ faq.question }}
                    </span>
                    <i class="bi" [ngClass]="faq.isExpanded ? 'bi-dash-circle-fill' : 'bi-plus-circle'" style="font-size: 24px;"></i>
                </div>

                <div class="faq-answer px-4 transition-all" [class.show]="faq.isExpanded">
                    <div class="py-3" style="border-top: 1px dashed rgba(107, 30, 46, 0.2);">
                        <p class="mb-0 text-justify" style="color: var(--kanila-text); line-height: 1.8;">
                            {{ faq.answer }}
                        </p>
                    </div>
                </div>
                
            </div>
        </div>

        <div class="text-center mt-5">
            <p class="mb-2">Bạn không tìm thấy câu trả lời?</p>
            <a routerLink="/contact" class="btn rounded-pill px-4 py-2 transition-all" style="background-color: var(--kanila-red); color: var(--kanila-white); text-decoration: none;">
                <i class="bi bi-headset me-2"></i> Liên Hệ CSKH
            </a>
        </div>

    </div>
</div>

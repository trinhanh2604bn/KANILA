<div class="dash-skel" aria-busy="true" aria-label="Loading dashboard">
  <div class="dash-skel__header">
    <div class="skel skel--title"></div>
    <div class="skel skel--sub"></div>
    <div class="skel skel--seg"></div>
  </div>
  <div class="dash-skel__filters">
    <div class="skel skel--pill"></div>
    <div class="skel skel--pill skel--pill-wide"></div>
    <div class="skel skel--pill"></div>
  </div>
  <div class="dash-skel__kpis">
    @for (i of [1, 2, 3, 4, 5]; track i) {
      <div class="skel skel--kpi"></div>
    }
  </div>
  <div class="skel skel--chart"></div>
  <div class="dash-skel__cols">
    <div class="skel skel--panel"></div>
    <div class="skel skel--panel"></div>
  </div>
</div>
